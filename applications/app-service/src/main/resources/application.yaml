server:
  port: ${AUTH_PORT:8080}
spring:
  application:
    name: "autenticacion"
  devtools:
    add-properties: false
  profiles:
    include: null

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

jwt:
  secret: ${JWT_SECRET:931d2c9d255f3e2e4562d9ba57fc6e55af8d98fdbfa85956c68b7f50d3ca344734b03e1386e4de1f}
  expiration:
    millis: 3600000

adapters:
  r2dbc:
    host: ${AUTH_DB_HOST:localhost}
    port: ${DB_PORT:3306}
    database: ${AUTH_DB_NAME:autenticacion}
    schema: "public"
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:user}
