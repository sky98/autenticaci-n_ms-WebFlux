server:
  port: ${AUTH_PORT}
spring:
  application:
    name: "autenticacion"
  devtools:
    add-properties: false
  profiles:
    include: null

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

jwt:
  secret: ${JWT_SECRET}
  expiration:
    millis: 3600000

adapters:
  r2dbc:
    host: ${AUTH_DB_HOST}
    port: ${DB_PORT}
    database: ${AUTH_DB_NAME}
    schema: "public"
    username: ${DB_USER}
    password: ${DB_PASSWORD}
