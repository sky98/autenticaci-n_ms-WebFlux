server:
  port: 8080
spring:
  application:
    name: "autenticacion"
  devtools:
    add-properties: false
  profiles:
    include: null

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

jwt:
  secret: ZXN0YSBlcyB1bmEgY2xhdmUgc2VjcmV0YSBwYXJhIHVuIHByb3llY3RvIGRlIHNwcmluZ3dlYmZsdXg
  expiration:
    millis: 3600000

adapters:
  r2dbc:
    host: "localhost"
    port: 3306
    database: "autenticacion"
    schema: "public"
    username: "root"
    password: "user"
